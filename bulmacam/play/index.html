<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/bulmacam/play/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bulmacam, her gün Klasik, Anlam ve Köprü modlarında üç Türkçe kelime bulmacası sunar. Ücretsiz, çevrimdışı, hesapsız.">
  <meta name="theme-color" content="#F4E8D4">

  <!-- iOS Smart App Banner: shows a native "Bulmacam / GET" banner in Safari on
       iPhone/iPad, pointing at the App Store listing. NOTE: add ", app-argument=<deep-link>"
       once the web routes to a specific puzzle, so the banner deep-links into the app. -->
  <meta name="apple-itunes-app" content="app-id=6781728537">

  <!-- Open Graph / Twitter: how a shared link previews in iMessage, Twitter/X,
       Discord, Facebook. Relative image + no hard-coded English domain so the
       Turkish edition never points at gazettle.app (the English app's site). -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Bulmacam">
  <meta property="og:title" content="Bulmacam: Günlük Bulmacalar">
  <meta property="og:description" content="Her gün üç Türkçe kelime bulmacası: Klasik, Anlam ve Köprü. Tek seri, her gün yeni.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bulmacam: Günlük Bulmacalar">
  <meta name="twitter:description" content="Her gün üç Türkçe kelime bulmacası: Klasik, Anlam ve Köprü. Tek seri, her gün yeni.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bulmacam">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Bulmacam: Günlük Bulmacalar</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
