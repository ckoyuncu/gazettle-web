<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulmacam App Store Görselleri</title>
    <style>
        body {
            margin: 0;
            font-family: Georgia, 'Times New Roman', serif;
            color: #2D2318;
            background: #F4E8D4;
            padding: 24px;
        }
        h1 { text-align: center; margin-bottom: 24px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            max-width: 1220px;
            margin: 0 auto;
        }
        img {
            width: 100%;
            height: auto;
            border: 1px solid #B8956C;
            box-shadow: 0 2px 14px rgba(45,35,24,0.15);
            background: #FAF6ED;
        }
    </style>
</head>
<body>
    <h1>Bulmacam App Store Görselleri</h1>
    <div class="grid">
        <a href="1_home.png"><img src="1_home.png" alt="Bulmacam ana ekran"></a>
        <a href="2_classic.png"><img src="2_classic.png" alt="Klasik modu"></a>
        <a href="3_semantic.png"><img src="3_semantic.png" alt="Anlam modu"></a>
        <a href="4_bridge.png"><img src="4_bridge.png" alt="Köprü modu"></a>
        <a href="5_dark.png"><img src="5_dark.png" alt="Koyu tema"></a>
    </div>
</body>
</html>
