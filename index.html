<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Gazettle is three daily word puzzles in one vintage newspaper: guess by letters, guess by meaning, or build the word chain. Free, offline, no account.">
  <meta name="theme-color" content="#F4E8D4">

  <!-- iOS Smart App Banner: shows a native "Gazettle / GET" banner in Safari on
       iPhone/iPad, pointing at the App Store listing. NOTE: add ", app-argument=<deep-link>"
       once the web routes to a specific puzzle, so the banner deep-links into the app. -->
  <meta name="apple-itunes-app" content="app-id=6778612419">

  <!-- Open Graph / Twitter: how a shared Gazettle link previews in iMessage,
       Twitter/X, Discord, Facebook. The share loop is the main growth lever, so
       a clean preview matters. Points at the gazettle.app custom domain. -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Gazettle">
  <meta property="og:title" content="Gazettle: Daily Word Puzzles">
  <meta property="og:description" content="Three daily word puzzles in one vintage newspaper: Classic, Semantic, and Bridge. One streak, fresh every day.">
  <meta property="og:url" content="https://gazettle.app/">
  <meta property="og:image" content="https://gazettle.app/og-card.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Gazettle: Daily Word Puzzles">
  <meta name="twitter:description" content="Three daily word puzzles in one vintage newspaper: Classic, Semantic, and Bridge. One streak, fresh every day.">
  <meta name="twitter:image" content="https://gazettle.app/og-card.png">

  <!-- Canonical + structured data: defend the brand SERP (people who hear
       "Gazettle" then search for it). VideoGame schema helps the rich result. -->
  <link rel="canonical" href="https://gazettle.app/">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Gazettle",
    "alternateName": "Gazettle: Daily Word Puzzles",
    "url": "https://gazettle.app/",
    "image": "https://gazettle.app/icons/Icon-512.png",
    "description": "Three daily word puzzles in one vintage newspaper: guess by letters (Classic), by meaning (Semantic), or build the word chain (Bridge). Free, offline, no account.",
    "applicationCategory": "GameApplication",
    "genre": "Word puzzle",
    "operatingSystem": "iOS, Web",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
    "author": { "@type": "Person", "name": "ckoyuncu" }
  }
  </script>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gazettle">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Gazettle: Daily Word Puzzles</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Crawlable fallback for search engines: the app renders client-side via
       JS, so this gives Google real, indexable content + a link. Users with JS
       never see it. -->
  <noscript>
    <h1>Gazettle: Daily Word Puzzles</h1>
    <p>Gazettle is three daily word puzzles in one calm, vintage-newspaper app:
      <strong>Classic</strong> (guess the hidden five-letter word),
      <strong>Semantic</strong> (guess by meaning, not letters), and
      <strong>Bridge</strong> (build a word chain from a start word to a target).
      One streak across all three, a fresh puzzle every day. Free, works offline,
      no account, no ads, no tracking.</p>
    <p>Get the iOS app:
      <a href="https://apps.apple.com/app/id6778612419">Gazettle on the App Store</a>.</p>
  </noscript>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
